      background: white;

              await window.storage.set('webinar-data-v2', JSON.stringify(INITIAL_DATA), true);
            }
            
            if (catResult && catResult.value) {
              setCategories(JSON.parse(catResult.value));
            } else {
              await window.storage.set('webinar-categories', JSON.stringify(CATEGORIES), true);
            }
          } else {
            const storedData = localStorage.getItem('webinar-data-v2');
            const storedCats = localStorage.getItem('webinar-categories');
            
            if (storedData) {
              setData(JSON.parse(storedData));
            } else {
              setData(INITIAL_DATA);
              localStorage.setItem('webinar-data-v2', JSON.stringify(INITIAL_DATA));
            }
            
            if (storedCats) {
              setCategories(JSON.parse(storedCats));
            } else {
              localStorage.setItem('webinar-categories', JSON.stringify(CATEGORIES));
            }
          }
        } catch (error) {
          console.error('Error loading data:', error);
          setData(INITIAL_DATA);
          setCategories(CATEGORIES);
        }
        setLoading(false);
      };

      const saveData = async (newData, newCategories) => {
        setData(newData);
        if (newCategories) setCategories(newCategories);
        
        try {
          if (window.storage && typeof window.storage.set === 'function') {
            await window.storage.set('webinar-data-v2', JSON.stringify(newData), true);
            if (newCategories) {
              await window.storage.set('webinar-categories', JSON.stringify(newCategories), true);
            }
          } else {
            localStorage.setItem('webinar-data-v2', JSON.stringify(newData));
            if (newCategories) {
              localStorage.setItem('webinar-categories', JSON.stringify(newCategories));
            }
          }
        } catch (error) {
          console.error('Error saving data:', error);
        }
      };

      const addCategory = (categoryName) => {
        const newCategories = {
          ...categories,
          [categoryName]: { color: 'cat-andet', icon: '📁' }
        };
        const newData = { ...data, [categoryName]: [] };
        saveData(newData, newCategories);
        setShowNewCategoryModal(false);
      };

      const moveSelectedItems = (targetCategory) => {
        const newData = { ...data };
        
        Object.keys(newData).forEach(cat => {
          const itemsToMove = newData[cat].filter(item => selectedItems.has(item.id));
          const remainingItems = newData[cat].filter(item => !selectedItems.has(item.id));
          
          if (itemsToMove.length > 0) {
            newData[cat] = remainingItems;
            newData[targetCategory] = [...(newData[targetCategory] || []), ...itemsToMove];
          }
        });
        
        saveData(newData);
        setSelectedItems(new Set());
        setShowMoveModal(false);
      };

      const addItem = async (category, item) => {
        const newData = { ...data };
        const maxId = Math.max(...Object.values(newData).flat().map(i => i.id), 0);
        newData[category] = [...(newData[category] || []), { ...item, id: maxId + 1, date: new Date().toISOString().split('T')[0] }];
        await saveData(newData);
        setShowAddForm(false);
      };

      const updateItem = async (category, itemId, updates) => {
        const newData = { ...data };
        newData[category] = newData[category].map(item => 
          item.id === itemId ? { ...item, ...updates } : item
        );
        await saveData(newData);
        setEditingItem(null);
      };

      const deleteItem = async (category, itemId) => {
        if (confirm('Er du sikker på at du vil slette denne idé?')) {
          const newData = { ...data };
          newData[category] = newData[category].filter(item => item.id !== itemId);
          await saveData(newData);
        }
      };

      const toggleSelectItem = (id) => {
        const newSelected = new Set(selectedItems);
        if (newSelected.has(id)) {
          newSelected.delete(id);
        } else {
          newSelected.add(id);
        }
        setSelectedItems(newSelected);
      };

      const allItems = useMemo(() => {
        return Object.entries(data).flatMap(([category, items]) => 
          items.map(item => ({ ...item, category }))
        );
      }, [data]);

      const filteredItems = useMemo(() => {
        let items = view === 'all' ? allItems : 
                    selectedCategory ? (data[selectedCategory] || []).map(item => ({ ...item, category: selectedCategory })) : 
                    [];
        
        if (filters.status !== 'all') {
          items = items.filter(item => item.status === filters.status);
        }
        
        if (filters.category !== 'all') {
          items = items.filter(item => item.category === filters.category);
        }
        
        if (filters.speaker !== 'all') {
          items = items.filter(item => item.speaker === filters.speaker);
        }
        
        if (filters.target !== 'all') {
          items = items.filter(item => item.target === filters.target);
        }
        
        if (filters.dateFrom) {
          items = items.filter(item => item.date >= filters.dateFrom);
        }
        
        if (filters.dateTo) {
          items = items.filter(item => item.date <= filters.dateTo);
        }
        
        if (searchTerm) {
          const term = searchTerm.toLowerCase();
          items = items.filter(item => 
            item.title.toLowerCase().includes(term) ||
            item.description.toLowerCase().includes(term) ||
            item.speaker.toLowerCase().includes(term) ||
            item.target.toLowerCase().includes(term) ||
            item.notes.toLowerCase().includes(term)
          );
        }
        
        return items;
      }, [data, view, selectedCategory, filters, searchTerm, allItems]);

      const uniqueSpeakers = useMemo(() => {
        return [...new Set(allItems.map(item => item.speaker).filter(Boolean))].sort();
      }, [allItems]);

      const uniqueTargets = useMemo(() => {
        return [...new Set(allItems.map(item => item.target).filter(Boolean))].sort();
      }, [allItems]);

      const stats = useMemo(() => {
        const totalIdeas = allItems.length;
        const byStatus = allItems.reduce((acc, item) => {
          acc[item.status] = (acc[item.status] || 0) + 1;
          return acc;
        }, {});
        return { totalIdeas, byStatus };
      }, [allItems]);

      if (loading) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="text-white text-2xl font-semibold">Indlæser...</div>
          </div>
        );
      }

      return (
        <div className="min-h-screen p-4 md:p-6">
          <div className="max-w-7xl mx-auto">
            {/* Header */}
            <div className="hk-header rounded-2xl p-6 mb-6 fade-in">
              <div className="flex items-center justify-between mb-6">
                <div className="flex items-center gap-4">
                  <div className="w-16 h-16 bg-gradient-to-br from-cyan-400 to-blue-600 rounded-xl flex items-center justify-center text-white text-3xl font-bold">
                    HK
                  </div>
                  <div>
                    <h1 className="text-3xl font-bold text-gray-800">Webinar Vidensbank</h1>
                    <p className="text-gray-600">Faglige arrangementer og webinarer</p>
                  </div>
                </div>
                <div className="text-right">
                  <div className="text-4xl font-bold bg-gradient-to-r from-cyan-500 to-blue-600 bg-clip-text text-transparent">{stats.totalIdeas}</div>
                  <div className="text-gray-600 text-sm">ideer i alt</div>
                </div>
              </div>
              
              {/* Navigation */}
              <div className="flex flex-wrap gap-2">
                <button
                  onClick={() => { setView('overview'); setSelectedCategory(null); setSelectedItems(new Set()); }}
                  className={`nav-btn ${view === 'overview' ? 'active' : ''}`}
                >
                  📊 Overblik
                </button>
                <button
                  onClick={() => { setView('all'); setSelectedCategory(null); setSelectedItems(new Set()); }}
                  className={`nav-btn ${view === 'all' ? 'active' : ''}`}
                >
                  🔍 Alle ideer
                </button>
                {Object.keys(categories).map(cat => (
                  <button
                    key={cat}
                    onClick={() => { setView('category'); setSelectedCategory(cat); setSelectedItems(new Set()); }}
                    className={`nav-btn ${selectedCategory === cat ? 'active' : ''}`}
                  >
                    {categories[cat].icon} {cat}
                  </button>
                ))}
                <button
                  onClick={() => setShowNewCategoryModal(true)}
                  className="nav-btn"
                  style={{background: 'linear-gradient(135deg, #FF9800 0%, #F57C00 100%)', color: 'white', border: 'none'}}
                >
                  ➕ Ny kategori
                </button>
              </div>

              {/* Selection toolbar */}
              {selectedItems.size > 0 && (
                <div className="mt-4 p-4 bg-cyan-50 rounded-xl border-2 border-cyan-200 flex items-center justify-between">
                  <span className="font-semibold text-cyan-900">{selectedItems.size} ideer valgt</span>
                  <div className="flex gap-2">
                    <button
                      onClick={() => setShowMoveModal(true)}
                      className="btn-hk"
                    >
                      📁 Flyt til kategori
                    </button>
                    <button
                      onClick={() => setSelectedItems(new Set())}
                      className="btn-secondary"
                    >
                      Ryd valg
                    </button>
                  </div>
                </div>
              )}
            </div>

            {/* Overview */}
            {view === 'overview' && (
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 fade-in">
                {Object.entries(categories).map(([category, config]) => {
                  const items = data[category] || [];
                  const statusCounts = items.reduce((acc, item) => {
                    acc[item.status] = (acc[item.status] || 0) + 1;
                    return acc;
                  }, {});
                  
                  return (
                    <div
                      key={category}
                      onClick={() => { setView('category'); setSelectedCategory(category); }}
                      className="rounded-xl p-5 cursor-pointer card-hover"
                      style={{background: 'white', border: '1px solid #e5e7eb'}}
                    >
                      <div className="flex items-center justify-between mb-4">
                        <div className={`w-14 h-14 rounded-xl ${config.color} flex items-center justify-center text-white text-2xl shadow-lg`}>
                          {config.icon}
                        </div>
                        <div className="text-3xl font-bold text-gray-800">{items.length}</div>
                      </div>
                      <h3 className="text-xl font-bold text-gray-800 mb-3">{category}</h3>
                      <div className="space-y-2">
                        <div className="flex justify-between text-sm">
                          <span className="text-gray-600">Idéer:</span>
                          <span className="font-semibold text-gray-800">{statusCounts['Idé'] || 0}</span>
                        </div>
                        <div className="flex justify-between text-sm">
                          <span className="text-gray-600">Planlagt:</span>
                          <span className="font-semibold text-gray-800">{statusCounts['Planlagt'] || 0}</span>
                        </div>
                        <div className="flex justify-between text-sm">
                          <span className="text-gray-600">Afholdt:</span>
                          <span className="font-semibold text-gray-800">{statusCounts['Afholdt'] || 0}</span>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {/* All Items / Category View */}
            {(view === 'all' || view === 'category') && (
              <div className="fade-in">
                {/* Filters */}
                <div style={{background: 'white', border: '1px solid #e5e7eb'}} className="rounded-xl p-5 mb-6">
                  <div className="flex items-center justify-between mb-4">
                    <h3 className="text-xl font-bold text-gray-800">
                      {view === 'all' ? '🔍 Alle ideer' : `${categories[selectedCategory]?.icon} ${selectedCategory}`}
                    </h3>
                    <div className="flex gap-2">
                      <button
                        onClick={() => setDisplayMode('cards')}
                        className={`px-4 py-2 rounded-lg font-medium text-sm transition-all ${
                          displayMode === 'cards' ? 'bg-cyan-500 text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'
                        }`}
                      >
                        📇 Cards
                      </button>
                      <button
                        onClick={() => setDisplayMode('list')}
                        className={`px-4 py-2 rounded-lg font-medium text-sm transition-all ${
                          displayMode === 'list' ? 'bg-cyan-500 text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'
                        }`}
                      >
                        📋 Liste
                      </button>
                    </div>
                  </div>
                  
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3 mb-4">
                    <input
                      type="text"
                      placeholder="🔍 Søg..."
                      value={searchTerm}
                      onChange={(e) => setSearchTerm(e.target.value)}
                      className="px-4 py-2 rounded-lg border-2 border-gray-200 focus:border-cyan-500 transition-all"
                    />
                    
                    <select
                      value={filters.status}
                      onChange={(e) => setFilters({ ...filters, status: e.target.value })}
                      className="px-4 py-2 rounded-lg border-2 border-gray-200 focus:border-cyan-500 transition-all"
                    >
                      <option value="all">Alle statusser</option>
                      <option value="Idé">Idé</option>
                      <option value="Planlagt">Planlagt</option>
                      <option value="Afholdt">Afholdt</option>
                    </select>
                    
                    {view === 'all' && (
                      <select
                        value={filters.category}
                        onChange={(e) => setFilters({ ...filters, category: e.target.value })}
                        className="px-4 py-2 rounded-lg border-2 border-gray-200 focus:border-cyan-500 transition-all"
                      >
                        <option value="all">Alle kategorier</option>
                        {Object.keys(categories).map(cat => (
                          <option key={cat} value={cat}>{cat}</option>
                        ))}
                      </select>
                    )}
                    
                    <select
                      value={filters.speaker}
                      onChange={(e) => setFilters({ ...filters, speaker: e.target.value })}
                      className="px-4 py-2 rounded-lg border-2 border-gray-200 focus:border-cyan-500 transition-all"
                    >
                      <option value="all">Alle oplægsholdere</option>
                      {uniqueSpeakers.map(speaker => (
                        <option key={speaker} value={speaker}>{speaker}</option>
                      ))}
                    </select>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
                    <select
                      value={filters.target}
                      onChange={(e) => setFilters({ ...filters, target: e.target.value })}
                      className="px-4 py-2 rounded-lg border-2 border-gray-200 focus:border-cyan-500 transition-all"
                    >
                      <option value="all">Alle målgrupper</option>
                      {uniqueTargets.map(target => (
                        <option key={target} value={target}>{target}</option>
                      ))}
                    </select>
                    
                    <input
                      type="date"
                      value={filters.dateFrom}
                      onChange={(e) => setFilters({ ...filters, dateFrom: e.target.value })}
                      className="px-4 py-2 rounded-lg border-2 border-gray-200 focus:border-cyan-500 transition-all"
                    />
                    
                    <input
                      type="date"
                      value={filters.dateTo}
                      onChange={(e) => setFilters({ ...filters, dateTo: e.target.value })}
                      className="px-4 py-2 rounded-lg border-2 border-gray-200 focus:border-cyan-500 transition-all"
                    />
                  </div>

                  <div className="flex items-center justify-between">
                    <div className="flex gap-3">
                      <button
                        onClick={() => {
                          setFilters({ status: 'all', category: 'all', speaker: 'all', target: 'all', dateFrom: '', dateTo: '' });
                          setSearchTerm('');
                        }}
                        className="px-4 py-2 text-sm text-gray-600 hover:text-gray-800 font-medium"
                      >
                        🔄 Nulstil filtre
                      </button>
                      <span className="text-gray-600 text-sm py-2">
                        Viser {filteredItems.length} af {view === 'all' ? allItems.length : (data[selectedCategory] || []).length} ideer
                      </span>
                    </div>
                    <button
                      onClick={() => setShowAddForm(true)}
                      className="btn-hk"
                    >
                      ➕ Tilføj ny idé
                    </button>
                  </div>
                </div>

                {/* Cards View */}
                {displayMode === 'cards' && (
                  <div className="grid grid-cols-1 gap-4">
                    {filteredItems.map((item) => (
                      <div key={item.id} style={{background: 'white', border: '1px solid #e5e7eb'}} className="rounded-xl p-5 card-hover">
                        {editingItem === item.id ? (
                          <EditForm
                            item={item}
                            onSave={(updates) => updateItem(item.category, item.id, updates)}
                            onCancel={() => setEditingItem(null)}
                          />
                        ) : (
                          <div>
                            <div className="flex items-start gap-4">
                              <input
                                type="checkbox"
                                checked={selectedItems.has(item.id)}
                                onChange={() => toggleSelectItem(item.id)}
                                className="checkbox-custom mt-1"
                              />
                              <div className="flex-1">
                                <div className="flex items-start justify-between mb-2">
                                  <h3 className="text-xl font-bold text-gray-800">{item.title}</h3>
                                  <span className={`status-badge status-${item.status.toLowerCase()}`}>
                                    {item.status}
                                  </span>
                                </div>
                                {item.description && (
                                  <p className="text-gray-600 mb-3">{item.description}</p>
                                )}
                                
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-3">
                                  {view === 'all' && (
                                    <div>
                                      <div className="text-gray-500 text-xs mb-1">Kategori</div>
                                      <div className="flex items-center gap-2">
                                        <span className="text-lg">{categories[item.category]?.icon}</span>
                                        <span className="font-medium text-gray-800 text-sm">{item.category}</span>
                                      </div>
                                    </div>
                                  )}
                                  {item.speaker && (
                                    <div>
                                      <div className="text-gray-500 text-xs mb-1">Oplægsholder</div>
                                      <div className="font-medium text-gray-800 text-sm">{item.speaker}</div>
                                    </div>
                                  )}
                                  {item.target && (
                                    <div>
                                      <div className="text-gray-500 text-xs mb-1">Målgruppe</div>
                                      <div className="font-medium text-gray-800 text-sm">{item.target}</div>
                                    </div>
                                  )}
                                  <div>
                                    <div className="text-gray-500 text-xs mb-1">Tilføjet</div>
                                    <div className="font-medium text-gray-800 text-sm">{item.date}</div>
                                  </div>
                                </div>
                                
                                {item.notes && (
                                  <div className="bg-yellow-50 rounded-lg p-3 mb-3 border border-yellow-200">
                                    <div className="text-yellow-800 text-xs font-semibold mb-1">📝 Noter</div>
                                    <div className="text-gray-700 text-sm">{item.notes}</div>
                                  </div>
                                )}
                              </div>
                            </div>
                            
                            <div className="flex gap-2 ml-9 mt-3">
                              <button
                                onClick={() => setEditingItem(item.id)}
                                className="px-4 py-2 rounded-lg bg-blue-50 text-blue-700 hover:bg-blue-100 transition-all font-medium text-sm"
                              >
                                ✏️ Rediger
                              </button>
                              <button
                                onClick={() => deleteItem(item.category, item.id)}
                                className="px-4 py-2 rounded-lg bg-red-50 text-red-700 hover:bg-red-100 transition-all font-medium text-sm"
                              >
                                🗑️ Slet
                              </button>
                            </div>
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                )}

                {/* List View */}
                {displayMode === 'list' && (
                  <div style={{background: 'white', border: '1px solid #e5e7eb'}} className="rounded-xl overflow-hidden">
                    <div className="overflow-x-auto">
                      <table className="w-full">
                        <thead style={{background: 'linear-gradient(135deg, #00B8D4 0%, #0066CC 100%)'}}>
                          <tr>
                            <th className="px-4 py-3 text-left">
                              <input
                                type="checkbox"
                                onChange={(e) => {
                                  if (e.target.checked) {
                                    setSelectedItems(new Set(filteredItems.map(i => i.id)));
                                  } else {
                                    setSelectedItems(new Set());
                                  }
                                }}
                                className="checkbox-custom"
                              />
                            </th>
                            <th className="px-4 py-3 text-left text-xs font-semibold text-white uppercase">Titel</th>
                            {view === 'all' && <th className="px-4 py-3 text-left text-xs font-semibold text-white uppercase">Kategori</th>}
                            <th className="px-4 py-3 text-left text-xs font-semibold text-white uppercase">Status</th>
                            <th className="px-4 py-3 text-left text-xs font-semibold text-white uppercase">Oplægsholder</th>
                            <th className="px-4 py-3 text-left text-xs font-semibold text-white uppercase">Målgruppe</th>
                            <th className="px-4 py-3 text-left text-xs font-semibold text-white uppercase">Dato</th>
                            <th className="px-4 py-3 text-left text-xs font-semibold text-white uppercase">Handlinger</th>
                          </tr>
                        </thead>
                        <tbody>
                          {filteredItems.map((item, idx) => (
                            <tr key={item.id} className={`table-row border-t border-gray-100 ${idx % 2 === 0 ? 'bg-white' : 'bg-gray-50'}`}>
                              <td className="px-4 py-3">
                                <input
                                  type="checkbox"
                                  checked={selectedItems.has(item.id)}
                                  onChange={() => toggleSelectItem(item.id)}
                                  className="checkbox-custom"
                                />
                              </td>
                              <td className="px-4 py-3">
                                <div className="font-semibold text-gray-800">{item.title}</div>
                                {item.description && <div className="text-sm text-gray-600">{item.description}</div>}
                              </td>
                              {view === 'all' && (
                                <td className="px-4 py-3">
                                  <div className="flex items-center gap-2">
                                    <span className="text-lg">{categories[item.category]?.icon}</span>
                                    <span className="text-sm font-medium text-gray-700">{item.category}</span>
                                  </div>
                                </td>
                              )}
                              <td className="px-4 py-3">
                                <span className={`status-badge status-${item.status.toLowerCase()}`}>
                                  {item.status}
                                </span>
                              </td>
                              <td className="px-4 py-3 text-sm text-gray-700">{item.speaker || '-'}</td>
                              <td className="px-4 py-3 text-sm text-gray-700">{item.target || '-'}</td>
                              <td className="px-4 py-3 text-sm text-gray-700">{item.date}</td>
                              <td className="px-4 py-3">
                                <div className="flex gap-1">
                                  <button
                                    onClick={() => setEditingItem(item.id)}
                                    className="p-2 rounded-lg bg-blue-50 text-blue-700 hover:bg-blue-100 transition-all"
                                    title="Rediger"
                                  >
                                    ✏️
                                  </button>
                                  <button
                                    onClick={() => deleteItem(item.category, item.id)}
                                    className="p-2 rounded-lg bg-red-50 text-red-700 hover:bg-red-100 transition-all"
                                    title="Slet"
                                  >
                                    🗑️
                                  </button>
                                </div>
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                    {filteredItems.length === 0 && (
                      <div className="p-12 text-center">
                        <div className="text-6xl mb-4">🔍</div>
                        <p className="text-gray-600 text-lg">Ingen resultater fundet</p>
                      </div>
                    )}
                  </div>
                )}

                {filteredItems.length === 0 && displayMode === 'cards' && (
                  <div style={{background: 'white', border: '1px solid #e5e7eb'}} className="rounded-xl p-12 text-center">
                    <div className="text-6xl mb-4">🔍</div>
                    <p className="text-gray-600 text-xl">Ingen resultater fundet</p>
                  </div>
                )}
              </div>
            )}

            {/* Modals - fortsætter i næste del... */}
            
            {showAddForm && (
              <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-6 z-50">
                <div style={{background: 'white', border: '1px solid #e5e7eb'}} className="rounded-2xl p-8 max-w-2xl w-full max-h-[90vh] overflow-y-auto">
                  <h2 className="text-2xl font-bold text-gray-800 mb-6">Tilføj ny idé</h2>
                  <AddForm
                    categories={Object.keys(categories)}
                    defaultCategory={selectedCategory}
                    onSave={(category, item) => addItem(category, item)}
                    onCancel={() => setShowAddForm(false)}
                  />
                </div>
              </div>
            )}

            {showNewCategoryModal && (
              <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-6 z-50">
                <div style={{background: 'white', border: '1px solid #e5e7eb'}} className="rounded-2xl p-8 max-w-lg w-full">
                  <h2 className="text-2xl font-bold text-gray-800 mb-6">Opret ny kategori</h2>
                  <NewCategoryForm
                    onSave={addCategory}
                    onCancel={() => setShowNewCategoryModal(false)}
                  />
                </div>
              </div>
            )}

            {showMoveModal && (
              <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-6 z-50">
                <div style={{background: 'white', border: '1px solid #e5e7eb'}} className="rounded-2xl p-8 max-w-lg w-full">
                  <h2 className="text-2xl font-bold text-gray-800 mb-6">Flyt {selectedItems.size} ideer til kategori</h2>
                  <div className="space-y-3">
                    {Object.keys(categories).map(cat => (
                      <button
                        key={cat}
                        onClick={() => moveSelectedItems(cat)}
                        className="w-full p-4 rounded-lg border-2 border-gray-200 hover:border-cyan-500 hover:bg-cyan-50 transition-all text-left"
                      >
                        <div className="flex items-center gap-3">
                          <span className="text-2xl">{categories[cat].icon}</span>
                          <span className="font-semibold text-gray-800">{cat}</span>
                        </div>
                      </button>
                    ))}
                    <button
                      onClick={() => setShowMoveModal(false)}
                      className="w-full btn-secondary"
                    >
                      Annuller
                    </button>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    function EditForm({ item, onSave, onCancel }) {
      const [formData, setFormData] = useState(item);

      return (
        <div className="space-y-3">
          <input
            type="text"
            value={formData.title}
            onChange={(e) => setFormData({ ...formData, title: e.target.value })}
            className="w-full px-4 py-2 rounded-lg border-2 border-gray-200 focus:border-cyan-500 transition-all"
            placeholder="Titel"
          />
          <input
            type="text"
            value={formData.description}
            onChange={(e) => setFormData({ ...formData, description: e.target.value })}
            className="w-full px-4 py-2 rounded-lg border-2 border-gray-200 focus:border-cyan-500 transition-all"
            placeholder="Beskrivelse"
          />
          <div className="grid grid-cols-2 gap-3">
            <input
              type="text"
              value={formData.speaker}
              onChange={(e) => setFormData({ ...formData, speaker: e.target.value })}
              className="px-4 py-2 rounded-lg border-2 border-gray-200 focus:border-cyan-500 transition-all"
              placeholder="Oplægsholder"
            />
            <input
              type="text"
              value={formData.target}
              onChange={(e) => setFormData({ ...formData, target: e.target.value })}
              className="px-4 py-2 rounded-lg border-2 border-gray-200 focus:border-cyan-500 transition-all"
              placeholder="Målgruppe"
            />
          </div>
          <select
            value={formData.status}
            onChange={(e) => setFormData({ ...formData, status: e.target.value })}
            className="w-full px-4 py-2 rounded-lg border-2 border-gray-200 focus:border-cyan-500 transition-all"
          >
            <option value="Idé">Idé</option>
            <option value="Planlagt">Planlagt</option>
            <option value="Afholdt">Afholdt</option>
          </select>
          <textarea
            value={formData.notes}
            onChange={(e) => setFormData({ ...formData, notes: e.target.value })}
            className="w-full px-4 py-2 rounded-lg border-2 border-gray-200 focus:border-cyan-500 transition-all"
            placeholder="Noter"
            rows="2"
          />
          <div className="flex gap-2">
            <button
              onClick={() => onSave(formData)}
              className="flex-1 btn-hk"
            >
              💾 Gem
            </button>
            <button
              onClick={onCancel}
              className="btn-secondary"
            >
              Annuller
            </button>
          </div>
        </div>
      );
    }

    function AddForm({ categories, defaultCategory, onSave, onCancel }) {
      const [formData, setFormData] = useState({
        title: '',
        description: '',
        target: '',
        speaker: '',
        status: 'Idé',
        notes: '',
        category: defaultCategory || categories[0]
      });

      return (
        <div className="space-y-4">
          <select
            value={formData.category}
            onChange={(e) => setFormData({ ...formData, category: e.target.value })}
            className="w-full px-4 py-2 rounded-lg border-2 border-gray-200 focus:border-cyan-500 transition-all"
          >
            {categories.map(cat => (
              <option key={cat} value={cat}>{cat}</option>
            ))}
          </select>
          <input
            type="text"
            value={formData.title}
            onChange={(e) => setFormData({ ...formData, title: e.target.value })}
            className="w-full px-4 py-2 rounded-lg border-2 border-gray-200 focus:border-cyan-500 transition-all"
            placeholder="Titel *"
          />
          <input
            type="text"
            value={formData.description}
            onChange={(e) => setFormData({ ...formData, description: e.target.value })}
            className="w-full px-4 py-2 rounded-lg border-2 border-gray-200 focus:border-cyan-500 transition-all"
            placeholder="Beskrivelse"
          />
          <div className="grid grid-cols-2 gap-3">
            <input
              type="text"
              value={formData.speaker}
              onChange={(e) => setFormData({ ...formData, speaker: e.target.value })}
              className="px-4 py-2 rounded-lg border-2 border-gray-200 focus:border-cyan-500 transition-all"
              placeholder="Oplægsholder"
            />
            <input
              type="text"
              value={formData.target}
              onChange={(e) => setFormData({ ...formData, target: e.target.value })}
              className="px-4 py-2 rounded-lg border-2 border-gray-200 focus:border-cyan-500 transition-all"
              placeholder="Målgruppe"
            />
          </div>
          <select
            value={formData.status}
            onChange={(e) => setFormData({ ...formData, status: e.target.value })}
            className="w-full px-4 py-2 rounded-lg border-2 border-gray-200 focus:border-cyan-500 transition-all"
          >
            <option value="Idé">Idé</option>
            <option value="Planlagt">Planlagt</option>
            <option value="Afholdt">Afholdt</option>
          </select>
          <textarea
            value={formData.notes}
            onChange={(e) => setFormData({ ...formData, notes: e.target.value })}
            className="w-full px-4 py-2 rounded-lg border-2 border-gray-200 focus:border-cyan-500 transition-all"
            placeholder="Noter"
            rows="2"
          />
          <div className="flex gap-2">
            <button
              onClick={() => formData.title && onSave(formData.category, formData)}
              disabled={!formData.title}
              className="flex-1 btn-hk disabled:opacity-50 disabled:cursor-not-allowed"
            >
              ➕ Tilføj
            </button>
            <button
              onClick={onCancel}
              className="btn-secondary"
            >
              Annuller
            </button>
          </div>
        </div>
      );
    }

    function NewCategoryForm({ onSave, onCancel }) {
      const [categoryName, setCategoryName] = useState('');

      return (
        <div className="space-y-4">
          <input
            type="text"
            value={categoryName}
            onChange={(e) => setCategoryName(e.target.value)}
            className="w-full px-4 py-2 rounded-lg border-2 border-gray-200 focus:border-cyan-500 transition-all"
            placeholder="Kategorinavn (fx 'Efterår 2026')"
          />
          <div className="flex gap-2">
            <button
              onClick={() => categoryName && onSave(categoryName)}
              disabled={!categoryName}
              className="flex-1 btn-hk disabled:opacity-50 disabled:cursor-not-allowed"
            >
              ✨ Opret kategori
            </button>
            <button
              onClick={onCancel}
              className="btn-secondary"
            >
              Annuller
            </button>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>

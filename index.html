    function App() {
      const [data, setData] = useState({});
      const [view, setView] = useState('overview');
      const [selectedCategory, setSelectedCategory] = useState(null);
      const [searchTerm, setSearchTerm] = useState('');
      const [filterStatus, setFilterStatus] = useState('all');
      const [editingItem, setEditingItem] = useState(null);
      const [showAddForm, setShowAddForm] = useState(false);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        loadData();
      }, []);

      const loadData = async () => {
        try {
          // Check if window.storage is available (Claude artifact)
          if (window.storage && typeof window.storage.get === 'function') {
            const result = await window.storage.get('webinar-data', true);
            if (result && result.value) {
              setData(JSON.parse(result.value));
            } else {
              setData(INITIAL_DATA);
              await window.storage.set('webinar-data', JSON.stringify(INITIAL_DATA), true);
            }
          } else {
            // Fallback to localStorage for standalone usage
            const stored = localStorage.getItem('webinar-data');
            if (stored) {
              setData(JSON.parse(stored));
            } else {
              setData(INITIAL_DATA);
              localStorage.setItem('webinar-data', JSON.stringify(INITIAL_DATA));
            }
          }
        } catch (error) {
          console.error('Error loading data:', error);
          setData(INITIAL_DATA);
          try {
            if (window.storage && typeof window.storage.set === 'function') {
              await window.storage.set('webinar-data', JSON.stringify(INITIAL_DATA), true);
            } else {
              localStorage.setItem('webinar-data', JSON.stringify(INITIAL_DATA));
            }
          } catch (saveError) {
            console.error('Error saving initial data:', saveError);
          }
        }
        setLoading(false);
      };

      const saveData = async (newData) => {
        setData(newData);
        try {
          if (window.storage && typeof window.storage.set === 'function') {
            await window.storage.set('webinar-data', JSON.stringify(newData), true);
          } else {
            localStorage.setItem('webinar-data', JSON.stringify(newData));
          }
        } catch (error) {
          console.error('Error saving data:', error);
        }
      };

      const addItem = async (category, item) => {
        const newData = { ...data };
        const maxId = Math.max(...Object.values(newData).flat().map(i => i.id), 0);
        newData[category] = [...(newData[category] || []), { ...item, id: maxId + 1, date: new Date().toISOString().split('T')[0] }];
        await saveData(newData);
        setShowAddForm(false);
      };

      const updateItem = async (category, itemId, updates) => {
        const newData = { ...data };
        newData[category] = newData[category].map(item => 
          item.id === itemId ? { ...item, ...updates } : item
        );
        await saveData(newData);
        setEditingItem(null);
      };

      const deleteItem = async (category, itemId) => {
        if (confirm('Er du sikker på at du vil slette denne idé?')) {
          const newData = { ...data };
          newData[category] = newData[category].filter(item => item.id !== itemId);
          await saveData(newData);
        }
      };

      const stats = useMemo(() => {
        const totalIdeas = Object.values(data).flat().length;
        const byStatus = Object.values(data).flat().reduce((acc, item) => {
          acc[item.status] = (acc[item.status] || 0) + 1;
          return acc;
        }, {});
        return { totalIdeas, byStatus };
      }, [data]);

      const filteredItems = useMemo(() => {
        if (!selectedCategory) return [];
        let items = data[selectedCategory] || [];
        
        if (filterStatus !== 'all') {
          items = items.filter(item => item.status === filterStatus);
        }
        
        if (searchTerm) {
          const term = searchTerm.toLowerCase();
          items = items.filter(item => 
            item.title.toLowerCase().includes(term) ||
            item.description.toLowerCase().includes(term) ||
            item.speaker.toLowerCase().includes(term)
          );
        }
        
        return items;
      }, [data, selectedCategory, filterStatus, searchTerm]);

      if (loading) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="text-white text-2xl mono">Indlæser...</div>
          </div>
        );
      }

      return (
        <div className="min-h-screen p-6">
          <div className="max-w-7xl mx-auto">
            {/* Header */}
            <div className="glass rounded-3xl p-8 mb-6 fade-in">
              <div className="flex items-center justify-between mb-4">
                <div>
                  <h1 className="text-5xl font-bold text-white mb-2">Webinar Vidensbank</h1>
                  <p className="text-white/80 text-lg">Faglige arrangementer og webinarer</p>
                </div>
                <div className="text-right">
                  <div className="text-4xl font-bold text-white mono">{stats.totalIdeas}</div>
                  <div className="text-white/80">ideer i alt</div>
                </div>
              </div>
              
              {/* Navigation */}
              <div className="flex gap-3 mt-6">
                <button
                  onClick={() => { setView('overview'); setSelectedCategory(null); }}
                  className={`px-6 py-3 rounded-xl font-semibold transition-all ${
                    view === 'overview' 
                      ? 'bg-white text-purple-600 shadow-lg' 
                      : 'bg-white/20 text-white hover:bg-white/30'
                  }`}
                >
                  📊 Overblik
                </button>
                {Object.keys(CATEGORIES).map(cat => (
                  <button
                    key={cat}
                    onClick={() => { setView('category'); setSelectedCategory(cat); }}
                    className={`px-6 py-3 rounded-xl font-semibold transition-all ${
                      selectedCategory === cat 
                        ? 'bg-white text-purple-600 shadow-lg' 
                        : 'bg-white/20 text-white hover:bg-white/30'
                    }`}
                  >
                    {CATEGORIES[cat].icon} {cat}
                  </button>
                ))}
              </div>
            </div>

            {/* Overview */}
            {view === 'overview' && (
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 fade-in">
                {Object.entries(CATEGORIES).map(([category, config]) => {
                  const items = data[category] || [];
                  const statusCounts = items.reduce((acc, item) => {
                    acc[item.status] = (acc[item.status] || 0) + 1;
                    return acc;
                  }, {});
                  
                  return (
                    <div
                      key={category}
                      onClick={() => { setView('category'); setSelectedCategory(category); }}
                      className="glass rounded-2xl p-6 cursor-pointer card-hover"
                    >
                      <div className="flex items-center justify-between mb-4">
                        <div className="text-4xl">{config.icon}</div>
                        <div className="text-3xl font-bold text-white mono">{items.length}</div>
                      </div>
                      <h3 className="text-2xl font-bold text-white mb-3">{category}</h3>
                      <div className="space-y-2">
                        <div className="flex justify-between text-sm">
                          <span className="text-white/70">Idéer:</span>
                          <span className="text-white font-semibold">{statusCounts['Idé'] || 0}</span>
                        </div>
                        <div className="flex justify-between text-sm">
                          <span className="text-white/70">Planlagt:</span>
                          <span className="text-white font-semibold">{statusCounts['Planlagt'] || 0}</span>
                        </div>
                        <div className="flex justify-between text-sm">
                          <span className="text-white/70">Afholdt:</span>
                          <span className="text-white font-semibold">{statusCounts['Afholdt'] || 0}</span>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {/* Category View */}
            {view === 'category' && selectedCategory && (
              <div className="fade-in">
                {/* Filters */}
                <div className="glass rounded-2xl p-6 mb-6">
                  <div className="flex flex-wrap gap-4">
                    <input
                      type="text"
                      placeholder="🔍 Søg..."
                      value={searchTerm}
                      onChange={(e) => setSearchTerm(e.target.value)}
                      className="flex-1 min-w-[200px] px-4 py-3 rounded-xl bg-white/20 text-white placeholder-white/60 border-2 border-white/30 focus:border-white focus:outline-none"
                    />
                    <select
                      value={filterStatus}
                      onChange={(e) => setFilterStatus(e.target.value)}
                      className="px-4 py-3 rounded-xl bg-white/20 text-white border-2 border-white/30 focus:border-white focus:outline-none"
                    >
                      <option value="all">Alle statusser</option>
                      <option value="Idé">Idé</option>
                      <option value="Planlagt">Planlagt</option>
                      <option value="Afholdt">Afholdt</option>
                    </select>
                    <button
                      onClick={() => setShowAddForm(true)}
                      className="px-6 py-3 rounded-xl bg-white text-purple-600 font-semibold hover:shadow-lg transition-all"
                    >
                      ➕ Tilføj ny idé
                    </button>
                  </div>
                </div>

                {/* Items Grid */}
                <div className="grid grid-cols-1 gap-4">
                  {filteredItems.map((item) => (
                    <div key={item.id} className="glass rounded-2xl p-6 card-hover">
                      {editingItem === item.id ? (
                        <EditForm
                          item={item}
                          onSave={(updates) => updateItem(selectedCategory, item.id, updates)}
                          onCancel={() => setEditingItem(null)}
                        />
                      ) : (
                        <div>
                          <div className="flex items-start justify-between mb-3">
                            <div className="flex-1">
                              <h3 className="text-xl font-bold text-white mb-2">{item.title}</h3>
                              {item.description && (
                                <p className="text-white/80 mb-2">{item.description}</p>
                              )}
                            </div>
                            <span className={`status-badge status-${item.status.toLowerCase()}`}>
                              {item.status}
                            </span>
                          </div>
                          
                          <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
                            {item.speaker && (
                              <div>
                                <div className="text-white/60 text-sm mb-1">Oplægsholder</div>
                                <div className="text-white font-medium">{item.speaker}</div>
                              </div>
                            )}
                            {item.target && (
                              <div>
                                <div className="text-white/60 text-sm mb-1">Målgruppe</div>
                                <div className="text-white font-medium">{item.target}</div>
                              </div>
                            )}
                            <div>
                              <div className="text-white/60 text-sm mb-1">Tilføjet</div>
                              <div className="text-white font-medium mono text-sm">{item.date}</div>
                            </div>
                          </div>
                          
                          {item.notes && (
                            <div className="bg-white/10 rounded-xl p-3 mb-4">
                              <div className="text-white/60 text-sm mb-1">Noter</div>
                              <div className="text-white">{item.notes}</div>
                            </div>
                          )}
                          
                          <div className="flex gap-2">
                            <button
                              onClick={() => setEditingItem(item.id)}
                              className="px-4 py-2 rounded-lg bg-white/20 text-white hover:bg-white/30 transition-all font-medium"
                            >
                              ✏️ Rediger
                            </button>
                            <button
                              onClick={() => deleteItem(selectedCategory, item.id)}
                              className="px-4 py-2 rounded-lg bg-red-500/20 text-white hover:bg-red-500/30 transition-all font-medium"
                            >
                              🗑️ Slet
                            </button>
                          </div>
                        </div>
                      )}
                    </div>
                  ))}
                </div>

                {filteredItems.length === 0 && (
                  <div className="glass rounded-2xl p-12 text-center">
                    <div className="text-6xl mb-4">🔍</div>
                    <p className="text-white text-xl">Ingen resultater fundet</p>
                  </div>
                )}
              </div>
            )}

            {/* Add Form Modal */}
            {showAddForm && (
              <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-6 z-50">
                <div className="bg-white rounded-3xl p-8 max-w-2xl w-full max-h-[90vh] overflow-y-auto">
                  <h2 className="text-3xl font-bold text-purple-600 mb-6">Tilføj ny idé</h2>
                  <AddForm
                    category={selectedCategory}
                    onSave={(item) => addItem(selectedCategory, item)}
                    onCancel={() => setShowAddForm(false)}
                  />
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    function EditForm({ item, onSave, onCancel }) {
      const [formData, setFormData] = useState(item);

      return (
        <div className="space-y-4">
          <input
            type="text"
            value={formData.title}
            onChange={(e) => setFormData({ ...formData, title: e.target.value })}
            className="w-full px-4 py-3 rounded-xl bg-white/20 text-white placeholder-white/60 border-2 border-white/30 focus:border-white focus:outline-none"
            placeholder="Titel"
          />
          <input
            type="text"
            value={formData.description}
            onChange={(e) => setFormData({ ...formData, description: e.target.value })}
            className="w-full px-4 py-3 rounded-xl bg-white/20 text-white placeholder-white/60 border-2 border-white/30 focus:border-white focus:outline-none"
            placeholder="Beskrivelse"
          />
          <div className="grid grid-cols-2 gap-4">
            <input
              type="text"
              value={formData.speaker}
              onChange={(e) => setFormData({ ...formData, speaker: e.target.value })}
              className="px-4 py-3 rounded-xl bg-white/20 text-white placeholder-white/60 border-2 border-white/30 focus:border-white focus:outline-none"
              placeholder="Oplægsholder"
            />
            <input
              type="text"
              value={formData.target}
              onChange={(e) => setFormData({ ...formData, target: e.target.value })}
              className="px-4 py-3 rounded-xl bg-white/20 text-white placeholder-white/60 border-2 border-white/30 focus:border-white focus:outline-none"
              placeholder="Målgruppe"
            />
          </div>
          <select
            value={formData.status}
            onChange={(e) => setFormData({ ...formData, status: e.target.value })}
            className="w-full px-4 py-3 rounded-xl bg-white/20 text-white border-2 border-white/30 focus:border-white focus:outline-none"
          >
            <option value="Idé">Idé</option>
            <option value="Planlagt">Planlagt</option>
            <option value="Afholdt">Afholdt</option>
          </select>
          <textarea
            value={formData.notes}
            onChange={(e) => setFormData({ ...formData, notes: e.target.value })}
            className="w-full px-4 py-3 rounded-xl bg-white/20 text-white placeholder-white/60 border-2 border-white/30 focus:border-white focus:outline-none"
            placeholder="Noter"
            rows="3"
          />
          <div className="flex gap-2">
            <button
              onClick={() => onSave(formData)}
              className="flex-1 px-6 py-3 rounded-xl bg-white text-purple-600 font-semibold hover:shadow-lg transition-all"
            >
              💾 Gem
            </button>
            <button
              onClick={onCancel}
              className="px-6 py-3 rounded-xl bg-white/20 text-white font-semibold hover:bg-white/30 transition-all"
            >
              Annuller
            </button>
          </div>
        </div>
      );
    }

    function AddForm({ category, onSave, onCancel }) {
      const [formData, setFormData] = useState({
        title: '',
        description: '',
        target: '',
        speaker: '',
        status: 'Idé',
        notes: ''
      });

      return (
        <div className="space-y-4">
          <input
            type="text"
            value={formData.title}
            onChange={(e) => setFormData({ ...formData, title: e.target.value })}
            className="w-full px-4 py-3 rounded-xl border-2 border-purple-200 focus:border-purple-500 focus:outline-none"
            placeholder="Titel *"
          />
          <input
            type="text"
            value={formData.description}
            onChange={(e) => setFormData({ ...formData, description: e.target.value })}
            className="w-full px-4 py-3 rounded-xl border-2 border-purple-200 focus:border-purple-500 focus:outline-none"
            placeholder="Beskrivelse"
          />
          <div className="grid grid-cols-2 gap-4">
            <input
              type="text"
              value={formData.speaker}
              onChange={(e) => setFormData({ ...formData, speaker: e.target.value })}
              className="px-4 py-3 rounded-xl border-2 border-purple-200 focus:border-purple-500 focus:outline-none"
              placeholder="Oplægsholder"
            />
            <input
              type="text"
              value={formData.target}
              onChange={(e) => setFormData({ ...formData, target: e.target.value })}
              className="px-4 py-3 rounded-xl border-2 border-purple-200 focus:border-purple-500 focus:outline-none"
              placeholder="Målgruppe"
            />
          </div>
          <select
            value={formData.status}
            onChange={(e) => setFormData({ ...formData, status: e.target.value })}
            className="w-full px-4 py-3 rounded-xl border-2 border-purple-200 focus:border-purple-500 focus:outline-none"
          >
            <option value="Idé">Idé</option>
            <option value="Planlagt">Planlagt</option>
            <option value="Afholdt">Afholdt</option>
          </select>
          <textarea
            value={formData.notes}
            onChange={(e) => setFormData({ ...formData, notes: e.target.value })}
            className="w-full px-4 py-3 rounded-xl border-2 border-purple-200 focus:border-purple-500 focus:outline-none"
            placeholder="Noter"
            rows="3"
          />
          <div className="flex gap-2">
            <button
              onClick={() => formData.title && onSave(formData)}
              disabled={!formData.title}
              className="flex-1 px-6 py-3 rounded-xl bg-purple-600 text-white font-semibold hover:bg-purple-700 transition-all disabled:opacity-50 disabled:cursor-not-allowed"
            >
              ➕ Tilføj
            </button>
            <button
              onClick={onCancel}
              className="px-6 py-3 rounded-xl bg-gray-200 text-gray-700 font-semibold hover:bg-gray-300 transition-all"
            >
              Annuller
            </button>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
